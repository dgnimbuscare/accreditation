  teal:'#007FA3', blue:'#407EC9', lBlue:'#7BAFD4', green:'#48A23F',

  offWhite:'#F7F9FA', lgrey:'#EAEEF1', mgrey:'#C4CDD4', dgrey:'#2A3340', text:'#1A2332',
};

const getBand = (pct) => {
  if(pct===null||pct===undefined||isNaN(pct))return null;
  if(pct>=90)return{label:'Outstanding',color:C.teal,bg:'#E3F4FA',short:'O'};
  if(pct>=75)return{label:'Good',color:C.green,bg:'#E9F5E8',short:'G'};
  if(pct>=50)return{label:'Requires Improvement',color:C.amber,bg:'#FDF4E3',short:'RI'};
  return{label:'Inadequate',color:C.red,bg:'#FEF0F0',short:'I'};
};

const scoreStyle = (s) => {
  if(s===1)return{bg:C.red,fg:'#fff'};
  if(s===2)return{bg:C.amber,fg:'#fff'};
  if(s===3)return{bg:C.green,fg:'#fff'};
  if(s===4)return{bg:C.teal,fg:'#fff'};
  return{bg:C.lgrey,fg:C.muted};
};

const scoreLabel = {1:'Inadequate',2:'Req. Improvement',3:'Good',4:'Outstanding'};
const cqcColor = (k) => k==='SAFE'?C.red:k==='EFFECTIVE'?C.green:k==='CARING'?'#E91E63':k==='RESPONSIVE'?C.amber:C.teal;

// ── HELPERS ───────────────────────────────────────────────────────────────
function calcSection(sectionId,scores){
  const sec=SECTIONS.find(s=>s.id===sectionId);
  if(!sec)return null;
  const answered=sec.criteria.filter(c=>scores[c.id]);
  if(answered.length===0)return null;
  const total=answered.reduce((sum,c)=>sum+(scores[c.id]||0),0);
  return Math.round((total/(answered.length*4))*100);
}
function calcOverall(scores){
  const all=SECTIONS.flatMap(s=>s.criteria);
  const answered=all.filter(c=>scores[c.id]);
  if(answered.length===0)return null;
  const total=answered.reduce((sum,c)=>sum+(scores[c.id]||0),0);
  return Math.round((total/(answered.length*4))*100);
}

// ── COMPONENTS ────────────────────────────────────────────────────────────
function ScoreRing({pct,size=90}){
  if(pct===null)return(
    <div style={{width:size,height:size,borderRadius:'50%',background:C.lgrey,
      display:'flex',alignItems:'center',justifyContent:'center'}}>
      <span style={{fontSize:12,color:C.muted,fontWeight:600}}>—</span>
    </div>
  );
  const band=getBand(pct);
  const r=(size/2)-8;
  const circ=2*Math.PI*r;
  const dash=(pct/100)*circ;
  return(
    <div style={{width:size,height:size,position:'relative'}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.lgrey} strokeWidth={8}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={band.color} strokeWidth={8}
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"/>
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',
        alignItems:'center',justifyContent:'center'}}>
        <span style={{fontSize:size*0.22,fontWeight:800,color:band.color,lineHeight:1}}>{pct}%</span>
        <span style={{fontSize:size*0.1,fontWeight:600,color:C.muted,marginTop:2}}>{band.short}</span>
      </div>
    </div>
  );
}

function Dashboard({scores,onSelectSection}){
  const overall=calcOverall(scores);
  const band=getBand(overall);
  const totalCriteria=SECTIONS.flatMap(s=>s.criteria).length;
  const answeredCount=Object.keys(scores).length;
  return(
    <div style={{padding:'0 16px 100px'}}>
      <div style={{background:band?`linear-gradient(135deg, ${band.color}15, ${band.bg})`:C.lgrey,
        border:`2px solid ${band?band.color:C.mgrey}`,borderRadius:20,padding:'24px 20px',
        margin:'16px 0 20px',display:'flex',alignItems:'center',gap:20}}>
        <ScoreRing pct={overall} size={100}/>
        <div style={{flex:1}}>
          <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:1.5,textTransform:'uppercase',marginBottom:4}}>Overall Score</div>
          <div style={{fontSize:26,fontWeight:900,color:band?band.color:C.muted,lineHeight:1.1}}>
            {overall!==null?`${overall}%`:'Not started'}
          </div>
          {band&&<div style={{fontSize:16,fontWeight:700,color:band.color,marginTop:4}}>{band.label}</div>}
          <div style={{fontSize:12,color:C.muted,marginTop:8}}>{answeredCount} of {totalCriteria} criteria scored</div>
        </div>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap'}}>
        {[['⭐','Outstanding','≥90%',C.teal],['✅','Good','≥75%',C.green],['⚠️','Req. Imp.','≥50%',C.amber],['❌','Inadequate','<50%',C.red]].map(([em,lbl,p,col])=>(
          <div key={lbl} style={{display:'flex',alignItems:'center',gap:5,background:'#fff',
            border:`1.5px solid ${col}`,borderRadius:12,padding:'4px 10px'}}>
            <span style={{fontSize:13}}>{em}</span>
            <span style={{fontSize:11,fontWeight:700,color:col}}>{lbl}</span>
            <span style={{fontSize:10,color:C.muted}}>{p}</span>
          </div>
        ))}
      </div>
      <div style={{fontSize:12,fontWeight:700,color:C.muted,letterSpacing:1.2,textTransform:'uppercase',marginBottom:10}}>Section Scores</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        {SECTIONS.map(sec=>{
          const pct=calcSection(sec.id,scores);
          const b=getBand(pct);
          const answered=sec.criteria.filter(c=>scores[c.id]).length;
          return(
            <button key={sec.id} onClick={()=>onSelectSection(sec.id)}
              style={{background:b?b.bg:'#fff',border:`2px solid ${b?b.color:C.lgrey}`,borderRadius:16,
                padding:'14px 12px',display:'flex',flexDirection:'column',gap:8,cursor:'pointer',
                textAlign:'left',boxShadow:'0 2px 8px rgba(0,0,0,0.06)',WebkitAppearance:'none'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <span style={{fontSize:24}}>{sec.icon}</span>
                <ScoreRing pct={pct} size={48}/>
              </div>
              <div>
                <div style={{fontSize:13,fontWeight:800,color:C.text,lineHeight:1.3,marginBottom:4}}>{sec.short}</div>
                <div style={{fontSize:10,fontWeight:600,color:C.muted}}>{answered}/{sec.criteria.length} scored</div>
                <div style={{fontSize:9,fontWeight:600,color:cqcColor(sec.cqcKey),marginTop:2,
                  background:`${cqcColor(sec.cqcKey)}18`,borderRadius:6,padding:'1px 6px',display:'inline-block'}}>{sec.cqcKey}</div>
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

function SectionView({section,scores,onScore,onBack}){
  const [expandedHint,setExpandedHint]=useState(null);
  const pct=calcSection(section.id,scores);
  const answered=section.criteria.filter(c=>scores[c.id]).length;
  return(
    <div style={{paddingBottom:100}}>
      <div style={{background:section.color,padding:'16px 16px 20px',position:'sticky',top:0,zIndex:10}}>
        <button onClick={onBack} style={{background:'rgba(255,255,255,0.25)',border:'none',borderRadius:10,
          color:'#fff',padding:'6px 14px',fontSize:13,fontWeight:700,cursor:'pointer',marginBottom:10,
          display:'flex',alignItems:'center',gap:6}}>← Back</button>
        <div style={{display:'flex',alignItems:'center',gap:12,color:'#fff'}}>
          <span style={{fontSize:32}}>{section.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:18,fontWeight:900,lineHeight:1.2}}>{section.title}</div>
            <div style={{fontSize:12,opacity:0.85,marginTop:2}}>{section.cqcKey} · {answered}/{section.criteria.length} scored</div>
          </div>
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:26,fontWeight:900}}>{pct!==null?`${pct}%`:'—'}</div>
            <div style={{fontSize:10,opacity:0.85}}>{pct!==null?getBand(pct).label:'Not scored'}</div>
          </div>
        </div>
        <div style={{background:'rgba(255,255,255,0.25)',borderRadius:6,height:6,marginTop:12}}>
          <div style={{background:'#fff',borderRadius:6,height:6,width:`${pct||0}%`,transition:'width 0.4s'}}/>
        </div>
      </div>
      <div style={{padding:'12px 16px',display:'flex',flexDirection:'column',gap:12}}>
        {section.criteria.map((c,i)=>{
          const selected=scores[c.id];
          const hintOpen=expandedHint===c.id;
          const st=scoreStyle(selected);
          return(
            <div key={c.id} style={{background:'#fff',borderRadius:16,overflow:'hidden',
              border:selected?`2px solid ${st.bg}`:`2px solid ${C.lgrey}`,
              boxShadow:'0 2px 8px rgba(0,0,0,0.06)'}}>
              <div style={{padding:'14px 14px 10px'}}>
                <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                  <div style={{minWidth:28,height:28,borderRadius:'50%',background:section.color,color:'#fff',
                    display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:800,flexShrink:0,marginTop:1}}>{i+1}</div>
                  <p style={{fontSize:14,lineHeight:1.55,color:C.text,margin:0,fontWeight:500}}>{c.text}</p>
                </div>
                <div style={{display:'flex',gap:8,marginTop:12}}>
                  {[1,2,3,4].map(s=>{
                    const ss=scoreStyle(s);
                    const isSel=selected===s;
                    return(
                      <button key={s}
                        onClick={()=>{onScore(c.id,isSel?null:s);setExpandedHint(isSel?null:c.id);}}
                        style={{flex:1,height:44,borderRadius:10,
                          background:isSel?ss.bg:'#fff',color:isSel?ss.fg:ss.bg,
                          border:`2px solid ${ss.bg}`,fontSize:15,fontWeight:800,cursor:'pointer',
                          WebkitAppearance:'none',
                          boxShadow:isSel?`0 3px 10px ${ss.bg}55`:'none',transition:'all 0.15s'}}>{s}</button>
                    );
                  })}
                </div>
                {selected&&(
                  <button onClick={()=>setExpandedHint(hintOpen?null:c.id)}
                    style={{marginTop:8,width:'100%',background:'none',border:'none',
                      display:'flex',alignItems:'center',justifyContent:'space-between',cursor:'pointer',padding:0}}>
                    <span style={{fontSize:12,fontWeight:700,color:st.bg}}>
                      Score {selected}: {scoreLabel[selected]} {hintOpen?'▲':'▼ Tap for guidance'}
                    </span>
                  </button>
                )}
              </div>
              {hintOpen&&selected&&(
                <div style={{background:`${st.bg}14`,borderTop:`2px solid ${st.bg}40`,padding:'12px 14px'}}>
                  <div style={{fontSize:11,fontWeight:800,color:st.bg,letterSpacing:0.8,textTransform:'uppercase',marginBottom:6}}>
                    Score {selected} — What this looks like:
                  </div>
                  <p style={{fontSize:13,lineHeight:1.6,color:C.text,margin:0}}>{c.hints[selected]}</p>
                  <div style={{marginTop:10,display:'flex',flexDirection:'column',gap:6}}>
                    {[1,2,3,4].filter(s=>s!==selected).map(s=>(
                      <div key={s} style={{padding:'8px 12px',borderRadius:10,background:'#fff',border:`1.5px solid ${scoreStyle(s).bg}50`}}>
                        <span style={{fontSize:11,fontWeight:800,color:scoreStyle(s).bg}}>Score {s} — {scoreLabel[s]}: </span>
                        <span style={{fontSize:12,color:C.muted}}>{c.hints[s]}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function SectionList({scores,onSelectSection}){
  return(
    <div style={{padding:'16px 16px 100px',display:'flex',flexDirection:'column',gap:10}}>
      <div style={{fontSize:12,fontWeight:700,color:C.muted,letterSpacing:1.2,textTransform:'uppercase',marginBottom:4}}>All 12 Sections</div>
      {SECTIONS.map(sec=>{
        const pct=calcSection(sec.id,scores);
        const b=getBand(pct);
        const answered=sec.criteria.filter(c=>scores[c.id]).length;
        return(
          <button key={sec.id} onClick={()=>onSelectSection(sec.id)}
            style={{background:'#fff',border:`2px solid ${b?b.color:C.lgrey}`,borderRadius:16,
              padding:'14px 16px',display:'flex',alignItems:'center',gap:14,cursor:'pointer',
              textAlign:'left',boxShadow:'0 2px 8px rgba(0,0,0,0.05)',WebkitAppearance:'none'}}>
            <span style={{fontSize:28,minWidth:36}}>{sec.icon}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:800,color:C.text}}>{sec.title}</div>
              <div style={{display:'flex',gap:8,alignItems:'center',marginTop:4}}>
                <span style={{fontSize:10,fontWeight:700,color:'#fff',background:cqcColor(sec.cqcKey),borderRadius:6,padding:'2px 8px'}}>{sec.cqcKey}</span>
                <span style={{fontSize:11,color:C.muted}}>{answered}/{sec.criteria.length} scored</span>
              </div>
            </div>
            <div style={{textAlign:'right'}}>
              {pct!==null?(
                <span style={{background:b.bg,color:b.color,border:`1.5px solid ${b.color}`,borderRadius:20,
                  padding:'3px 12px',fontSize:12,fontWeight:700,whiteSpace:'nowrap'}}>{pct}% — {b.label}</span>
              ):<span style={{fontSize:12,color:C.muted,fontWeight:600}}>Not scored</span>}
              <div style={{fontSize:11,color:C.muted,marginTop:4}}>→</div>
            </div>
          </button>
        );
      })}
    </div>
  );
}

function SiteDetails({siteDetails,setSiteDetails}){
  const fields=[
    {key:'siteName',label:'Site Name',type:'text',placeholder:'e.g. Nimbuscare Acomb'},
    {key:'siteAddress',label:'Site Address',type:'text',placeholder:'Full address'},
    {key:'inspectionDate',label:'Inspection Date',type:'date'},
    {key:'inspectionType',label:'Inspection Type',type:'select',options:['Routine Inspection','Follow-up Inspection','Responsive Inspection','Themed Inspection','Well-Led Review']},
    {key:'registeredManager',label:'Registered Manager',type:'text',placeholder:'Full name'},
    {key:'cqcLocationId',label:'CQC Location ID',type:'text',placeholder:'1-XXXXXXXXXX'},
    {key:'inspector',label:'Inspector / Assessor',type:'text',placeholder:'Name of person completing this'},
    {key:'registeredProvider',label:'Registered Provider',type:'select',options:['Nimbuscare Ltd','Nimbuscare CIC','Both']},
    {key:'notes',label:'Pre-Inspection Notes',type:'textarea',placeholder:'Any context, known issues, focus areas…'},
  ];
  const inputStyle={width:'100%',boxSizing:'border-box',border:`2px solid ${C.lgrey}`,borderRadius:10,
    padding:'12px 14px',fontSize:15,fontFamily:'inherit',color:C.text,background:'#fff',outline:'none'};
  return(
    <div style={{padding:'16px 16px 100px'}}>
      <div style={{fontSize:12,fontWeight:700,color:C.muted,letterSpacing:1.2,textTransform:'uppercase',marginBottom:16}}>Site & Inspection Details</div>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        {fields.map(f=>(
          <div key={f.key}>
            <label style={{fontSize:12,fontWeight:700,color:C.muted,letterSpacing:0.5,textTransform:'uppercase',display:'block',marginBottom:5}}>{f.label}</label>
            {f.type==='select'?(
              <select value={siteDetails[f.key]||''} onChange={e=>setSiteDetails(p=>({...p,[f.key]:e.target.value}))} style={inputStyle}>
                <option value=''>Select…</option>
                {f.options.map(o=><option key={o} value={o}>{o}</option>)}
              </select>
            ):f.type==='textarea'?(
              <textarea value={siteDetails[f.key]||''} onChange={e=>setSiteDetails(p=>({...p,[f.key]:e.target.value}))}
                placeholder={f.placeholder} rows={4} style={{...inputStyle,resize:'vertical'}}/>
            ):(
              <input type={f.type} value={siteDetails[f.key]||''} onChange={e=>setSiteDetails(p=>({...p,[f.key]:e.target.value}))}
                placeholder={f.placeholder} style={inputStyle}/>
            )}
          </div>
        ))}
      </div>
      <div style={{marginTop:20,background:C.lgrey,borderRadius:14,padding:'14px 16px'}}>
        <div style={{fontSize:12,fontWeight:700,color:C.muted,marginBottom:4}}>💡 About this tool</div>
        <p style={{fontSize:12,color:C.muted,margin:0,lineHeight:1.6}}>
          Excellence in Care Accreditation Programme v2.0 · Nimbuscare · 12 sections · 62 criteria<br/>
          Outstanding ≥90% · Good ≥75% · Requires Improvement ≥50% · Inadequate &lt;50%<br/>
          Scoring: 1 = Inadequate · 2 = Requires Improvement · 3 = Good · 4 = Outstanding
        </p>
      </div>
    </div>
  );
}

function App(){
  const [scores,setScores]=useState({});
  const [view,setView]=useState('dashboard');
  const [selectedSection,setSelected]=useState(null);
  const [siteDetails,setSiteDetails]=useState({});
  const onScore=(id,score)=>setScores(prev=>{const n={...prev};if(score===null)delete n[id];else n[id]=score;return n;});
  const onSelectSection=(id)=>{setSelected(SECTIONS.find(s=>s.id===id));setView('sectionDetail');};
  const overall=calcOverall(scores);
  const band=getBand(overall);
  return(
    <div style={{fontFamily:"'Segoe UI',system-ui,-apple-system,sans-serif",background:C.offWhite,minHeight:'100vh',maxWidth:768,margin:'0 auto',position:'relative'}}>
      <div style={{background:C.teal,padding:'12px 16px 10px',display:'flex',alignItems:'center',
        justifyContent:'space-between',position:'sticky',top:0,zIndex:20,
        boxShadow:'0 2px 12px rgba(0,127,163,0.4)'}}>
        <div>
          <div style={{color:'#fff',fontSize:15,fontWeight:900,letterSpacing:0.3}}>Excellence in Care</div>
          <div style={{color:'rgba(255,255,255,0.75)',fontSize:11,fontWeight:600}}>
            {siteDetails.siteName||'Nimbuscare Accreditation Programme'}
          </div>
        </div>
        {overall!==null&&(
          <div style={{background:'rgba(255,255,255,0.2)',borderRadius:12,padding:'6px 12px',textAlign:'center'}}>
            <div style={{color:'#fff',fontSize:20,fontWeight:900,lineHeight:1}}>{overall}%</div>
            <div style={{color:'rgba(255,255,255,0.85)',fontSize:10,fontWeight:700}}>{band.label}</div>
          </div>
        )}
      </div>
      <div>
        {view==='dashboard'&&<Dashboard scores={scores} onSelectSection={onSelectSection}/>}
        {view==='sections'&&<SectionList scores={scores} onSelectSection={onSelectSection}/>}
        {view==='sectionDetail'&&selectedSection&&<SectionView section={selectedSection} scores={scores} onScore={onScore} onBack={()=>setView('sections')}/>}
        {view==='site'&&<SiteDetails siteDetails={siteDetails} setSiteDetails={setSiteDetails}/>}
      </div>
      <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:768,
        background:'#fff',borderTop:`1.5px solid ${C.lgrey}`,display:'grid',gridTemplateColumns:'repeat(3,1fr)',
        paddingBottom:'env(safe-area-inset-bottom,8px)',boxShadow:'0 -4px 20px rgba(0,0,0,0.08)',zIndex:30}}>
        {[['dashboard','Dashboard','📊'],['sections','Sections','📋'],['site','Site Details','🏥']].map(([v,label,icon])=>{
          const active=view===v||(v==='sections'&&view==='sectionDetail');
          return(
            <button key={v} onClick={()=>{setView(v);if(v!=='sections')setSelected(null);}}
              style={{background:'none',border:'none',padding:'10px 0 8px',display:'flex',
                flexDirection:'column',alignItems:'center',gap:3,cursor:'pointer',WebkitAppearance:'none'}}>
              <span style={{fontSize:22}}>{icon}</span>
              <span style={{fontSize:11,fontWeight:active?800:600,color:active?C.teal:C.muted}}>{label}</span>
              {active&&<div style={{width:24,height:3,background:C.teal,borderRadius:3}}/>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
