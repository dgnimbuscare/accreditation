// ── GRAPH API HELPERS ─────────────────────────────────────────────────────
const SCOPES = ['https://graph.microsoft.com/Sites.ReadWrite.All'];

async function graphFetch(path, token, options={}) {
  const res = await fetch(`https://graph.microsoft.com/v1.0${path}`, {
    ...options,
    headers: { Authorization:`Bearer ${token}`, 'Content-Type':'application/json', ...options.headers }
  });
  if(!res.ok){ const e = await res.text(); throw new Error(`Graph ${res.status}: ${e}`); }
  if(res.status===204) return null;
  return res.json();
}
const graphGet  = (p,t)    => graphFetch(p,t);
const graphPost = (p,b,t)  => graphFetch(p,t,{method:'POST', body:JSON.stringify(b)});
const graphDel  = (p,t)    => graphFetch(p,t,{method:'DELETE'});

async function getSiteId(token, host, sitePath) {
  const data = await graphGet(`/sites/${host}:${sitePath}`, token);
  return data.id;
}

async function ensureList(token, siteId, listName) {
  // Check if list exists
  const lists = await graphGet(
    `/sites/${siteId}/lists?$filter=displayName eq '${encodeURIComponent(listName)}'&$select=id,displayName`,
    token
  );
  if(lists.value && lists.value.length > 0) return lists.value[0].id;

  // Create the list
  const created = await graphPost(`/sites/${siteId}/lists`, {
    displayName: listName,
    list: { template: 'genericList' },
    columns: [
      { name:'InspectionData', description:'Full inspection JSON', text:{ allowMultipleLines:true, linesForEditing:6 }},
      { name:'InspectionSite', description:'Site name', text:{}},
      { name:'InspectionDate', description:'Date of inspection', dateTime:{}},
      { name:'OverallScore',   description:'Overall score %',  number:{}},
    ]
  }, token);
  return created.id;
}

async function spSave(token, siteId, listId, record) {
  return graphPost(`/sites/${siteId}/lists/${listId}/items`, {
    fields: {
      Title:          record.title,
      InspectionSite: record.siteDetails?.siteName || '',
      InspectionDate: record.siteDetails?.inspectionDate || null,
      OverallScore:   record.overallScore || 0,
      InspectionData: JSON.stringify(record),
    }
  }, token);
}

async function spLoad(token, siteId, listId) {
  const data = await graphGet(
    `/sites/${siteId}/lists/${listId}/items?expand=fields($select=Title,InspectionSite,InspectionDate,OverallScore,InspectionData,Created)&$orderby=fields/Created desc&$top=100`,
    token
  );
  return (data.value || []).map(item => {
    try {
      const parsed = JSON.parse(item.fields.InspectionData || '{}');
      return { ...parsed, spItemId: item.id, savedAt: parsed.savedAt || item.fields.Created };
    } catch { return null; }
  }).filter(Boolean);
}

async function spDelete(token, siteId, listId, spItemId) {
  return graphDel(`/sites/${siteId}/lists/${listId}/items/${spItemId}`, token);
}

// ── CALCULATION HELPERS ───────────────────────────────────────────────────
const calcSection = (id, scores) => {
  const sec = SECTIONS.find(s=>s.id===id);
  if(!sec) return null;
  const ans = sec.criteria.filter(c=>scores[c.id]);
  if(!ans.length) return null;
  return Math.round(ans.reduce((s,c)=>s+(scores[c.id]||0),0)/(ans.length*4)*100);
};
const calcOverall = scores => {
  const all = SECTIONS.flatMap(s=>s.criteria);
  const ans = all.filter(c=>scores[c.id]);
  if(!ans.length) return null;
  return Math.round(ans.reduce((s,c)=>s+(scores[c.id]||0),0)/(ans.length*4)*100);
};

function ScoreRing({pct, size=90}) {
  if(pct===null) return (
    <div style={{width:size,height:size,borderRadius:'50%',background:C.lgrey,
      display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
      <span style={{fontSize:11,color:C.muted,fontWeight:600,fontFamily:"'Lato',sans-serif"}}>—</span>
    </div>
  );
  const band=getBand(pct), r=(size/2)-7, circ=2*Math.PI*r, dash=(pct/100)*circ;
  return (
    <div style={{width:size,height:size,position:'relative',flexShrink:0}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.lgrey} strokeWidth={6}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={band.color} strokeWidth={6}
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"/>
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',
        alignItems:'center',justifyContent:'center'}}>
        <span style={{fontSize:size*0.21,fontWeight:800,color:band.color,lineHeight:1,
          fontFamily:"'Montserrat',sans-serif"}}>{pct}%</span>
        <span style={{fontSize:size*0.1,fontWeight:700,color:C.muted,marginTop:1,
          fontFamily:"'Lato',sans-serif"}}>{band.short}</span>
      </div>
    </div>
  );
}

  useEffect(() => { const t=setTimeout(onDone,3200); return ()=>clearTimeout(t); },[]);
  const bg = type==='error'?'#D94F55':type==='warn'?C.amber:C.teal;
  return (
    <div className="no-print" style={{
      position:'fixed',top:80,left:'50%',transform:'translateX(-50%)',
      background:bg,color:'#fff',borderRadius:6,padding:'10px 20px',

              {/* Observation notes panel */}
              {noteOpen&&(
                <div style={{padding:'0 14px 12px'}}>
                  <textarea value={criterionNotes[c.id]||''} onChange={e=>onCriterionNote(c.id,e.target.value)}
                    placeholder="Record your observations, evidence seen, or follow-up actions…"
                    rows={3}
                    style={{width:'100%',border:`1.5px solid ${C.teal}50`,borderRadius:6,
                      padding:'10px 12px',fontSize:13,lineHeight:1.5,color:C.text,
                      background:C.tealBg,outline:'none',fontFamily:"'Lato',sans-serif"}}/>
                </div>
              )}
              {/* Guidance panel */}
              {hintOpen&&selected&&(
                <div style={{background:`${st.bg}0D`,borderTop:`1px solid ${st.bg}30`,padding:'12px 14px'}}>
                  <div style={{fontSize:11,fontWeight:700,color:st.bg,letterSpacing:0.6,
                    textTransform:'uppercase',marginBottom:6,fontFamily:"'Lato',sans-serif"}}>
                    Score {selected} — what this looks like
                  </div>
                  <p style={{fontSize:13,lineHeight:1.65,color:C.text,margin:0,
                    fontFamily:"'Lato',sans-serif"}}>{c.hints[selected]}</p>
                  <div style={{marginTop:10,display:'flex',flexDirection:'column',gap:5}}>
                    {[1,2,3,4].filter(s=>s!==selected).map(s=>(
                      <div key={s} style={{padding:'8px 10px',borderRadius:6,background:'#fff',
                        border:`1px solid ${sStyle(s).bg}40`}}>
                        <span style={{fontSize:11,fontWeight:700,color:sStyle(s).bg,
                          fontFamily:"'Lato',sans-serif"}}>Score {s} — {sLabel[s]}: </span>
                        <span style={{fontSize:12,color:C.muted,lineHeight:1.5,
                          fontFamily:"'Lato',sans-serif"}}>{c.hints[s]}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          );
        })}
        {/* Section-level notes */}
        <div style={{background:C.card,borderRadius:8,padding:'16px',
          border:`1px solid ${section.color}40`,borderLeft:`3px solid ${section.color}`,
          boxShadow:'0 1px 3px rgba(0,0,0,0.05)'}}>
          <div style={{fontSize:11,fontWeight:700,color:section.color,letterSpacing:0.6,
            textTransform:'uppercase',marginBottom:8,fontFamily:"'Lato',sans-serif"}}>
            Section Observations
          </div>
          <textarea value={sectionNotes[section.id]||''} onChange={e=>onSectionNote(section.id,e.target.value)}
            placeholder={`Overall observations for ${section.title}. Record key findings, themes, strengths, gaps, or actions required…`}
            rows={4}
            style={{width:'100%',border:`1px solid ${section.color}40`,borderRadius:6,
              padding:'12px',fontSize:13,lineHeight:1.6,color:C.text,
              background:`${section.color}08`,outline:'none',fontFamily:"'Lato',sans-serif"}}/>
        </div>
      </div>
    </div>
  );
}

// ── SECTION LIST ──────────────────────────────────────────────────────────
function SectionList({scores, sectionNotes, criterionNotes, onSelectSection}) {
  return (
    <div style={{padding:'16px 16px 100px',display:'flex',flexDirection:'column',gap:8}}>
      <p style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:1.3,
        textTransform:'uppercase',marginBottom:6,fontFamily:"'Lato',sans-serif"}}>All 12 Sections</p>
      {SECTIONS.map(sec => {
        const pct=calcSection(sec.id,scores), b=getBand(pct);
        const ans=sec.criteria.filter(c=>scores[c.id]).length;
        const hasNote=!!(sectionNotes[sec.id]||'').trim();
        const criterionNoteCount=sec.criteria.filter(c=>(criterionNotes[c.id]||'').trim()).length;
        return (
          <button key={sec.id} onClick={()=>onSelectSection(sec.id)}
            style={{background:C.card,
              border:`1px solid ${b?b.color+'40':C.lgrey}`,
              borderLeft:`3px solid ${b?b.color:C.lgrey}`,
              borderRadius:8,padding:'13px 14px',
              display:'flex',alignItems:'center',gap:12,cursor:'pointer',
              textAlign:'left',boxShadow:'0 1px 3px rgba(0,0,0,0.05)',
              WebkitAppearance:'none',transition:'box-shadow 0.15s'}}
            onTouchStart={e=>{e.currentTarget.style.transform='scale(0.98)'}}
            onTouchEnd={e=>{e.currentTarget.style.transform='scale(1)'}}>
            <span style={{fontSize:24,minWidth:32,textAlign:'center'}}>{sec.icon}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,fontWeight:700,color:C.text,
                fontFamily:"'Lato',sans-serif"}}>{sec.title}</div>
              <div style={{display:'flex',gap:7,alignItems:'center',marginTop:4,flexWrap:'wrap'}}>
                <span style={{fontSize:9,fontWeight:700,color:'#fff',
                  background:cqcCol(sec.cqcKey),borderRadius:3,
                  padding:'2px 6px',letterSpacing:0.4}}>{sec.cqcKey}</span>
                <span style={{fontSize:11,color:C.muted,fontFamily:"'Lato',sans-serif"}}>
                  {ans}/{sec.criteria.length} scored
                </span>
                {(hasNote||criterionNoteCount>0)&&(
                  <span style={{fontSize:10,color:C.teal,fontFamily:"'Lato',sans-serif"}}>
                    {[hasNote&&'section note',criterionNoteCount&&`${criterionNoteCount} obs.`].filter(Boolean).join(' · ')}
                  </span>
                )}
              </div>
            </div>
            <div style={{textAlign:'right',flexShrink:0}}>
              {pct!==null?(
                <span style={{background:b.bg,color:b.color,
                  border:`1px solid ${b.color}40`,borderRadius:20,
                  padding:'3px 10px',fontSize:11,fontWeight:700,
                  whiteSpace:'nowrap',fontFamily:"'Lato',sans-serif"}}>
                  {pct}% {b.short}
                </span>
              ):<span style={{fontSize:11,color:C.muted,fontFamily:"'Lato',sans-serif"}}>Not scored</span>}
              <div style={{fontSize:11,color:C.teal,marginTop:3}}>›</div>
            </div>
          </button>
        );
      })}
    </div>
  );
}

// ── SITE DETAILS ──────────────────────────────────────────────────────────
function SiteDetails({siteDetails, setSiteDetails}) {
  const fields = [
    {key:'siteName',        label:'Site Name',          type:'text',     placeholder:'e.g. Nimbuscare Acomb'},
    {key:'siteAddress',     label:'Site Address',        type:'text',     placeholder:'Full address'},
    {key:'inspectionDate',  label:'Inspection Date',     type:'date'},
    {key:'inspectionType',  label:'Inspection Type',     type:'select',   options:['Routine Inspection','Follow-up Inspection','Responsive Inspection','Themed Inspection','Well-Led Review']},
    {key:'registeredManager',label:'Registered Manager', type:'text',     placeholder:'Full name'},
    {key:'cqcLocationId',   label:'CQC Location ID',     type:'text',     placeholder:'1-XXXXXXXXXX'},
    {key:'inspector',       label:'Completed By',        type:'text',     placeholder:'Name of inspector / assessor'},
    {key:'registeredProvider',label:'Registered Provider',type:'select', options:['Nimbuscare Ltd','Nimbuscare CIC','Both']},
    {key:'focusAreas',      label:'Inspection Focus Areas',type:'textarea',placeholder:'Key areas, concerns or themes for this inspection…'},
    {key:'contextNotes',    label:'Contextual Notes',    type:'textarea', placeholder:'Any relevant context, recent incidents, staffing changes, or known risks…'},
  ];
  const inp = {width:'100%',boxSizing:'border-box',border:`1.5px solid ${C.lgrey}`,borderRadius:6,
    padding:'11px 13px',fontSize:14,fontFamily:"'Lato',sans-serif",color:C.text,
    background:C.card,outline:'none',transition:'border-color 0.15s'};
  return (
    <div style={{padding:'16px 16px 100px'}}>
      <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:1.2,
        textTransform:'uppercase',marginBottom:16}}>Site & Inspection Details</div>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        {fields.map(f=>(
          <div key={f.key}>
            <label style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:0.5,
              textTransform:'uppercase',display:'block',marginBottom:5}}>{f.label}</label>
            {f.type==='select'?(
              <select value={siteDetails[f.key]||''} onChange={e=>setSiteDetails(p=>({...p,[f.key]:e.target.value}))} style={inp}>
                <option value=''>Select…</option>
                {f.options.map(o=><option key={o} value={o}>{o}</option>)}
              </select>
            ):f.type==='textarea'?(
              <textarea value={siteDetails[f.key]||''} onChange={e=>setSiteDetails(p=>({...p,[f.key]:e.target.value}))}
                placeholder={f.placeholder} rows={3} style={{...inp,resize:'vertical'}}/>
            ):(
              <input type={f.type} value={siteDetails[f.key]||''} onChange={e=>setSiteDetails(p=>({...p,[f.key]:e.target.value}))}
                placeholder={f.placeholder||''} style={inp}/>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── PAST INSPECTIONS LIST ─────────────────────────────────────────────────
function PastInspections({inspections, isAuthenticated, onSignIn, onView, onDelete, isLoading}) {
  if(!isAuthenticated) return (
    <div style={{padding:'40px 24px',textAlign:'center'}}>
      <div style={{fontSize:48,marginBottom:16}}>☁️</div>
      <div style={{fontSize:17,fontWeight:800,color:C.text,marginBottom:8}}>Sign in to view past inspections</div>
      <div style={{fontSize:13,color:C.muted,marginBottom:24,lineHeight:1.6}}>
        Connect to SharePoint to save and retrieve inspection records
      </div>

        borderRadius:12,padding:'12px 28px',fontSize:15,fontWeight:700,cursor:'pointer'}}>
        Sign in with Microsoft
      </button>
    </div>
  );
  if(isLoading) return (
    <div style={{padding:'60px 24px',textAlign:'center'}}>
      <div style={{fontSize:32,marginBottom:12}}>⏳</div>
      <div style={{fontSize:14,color:C.muted}}>Loading from SharePoint…</div>
    </div>

    <div style={{padding:'60px 24px',textAlign:'center'}}>
      <div style={{fontSize:48,marginBottom:16}}>📂</div>

      <div style={{fontSize:13,color:C.muted}}>Complete and save an inspection to see it here</div>

  );
  return (
    <div style={{padding:'16px 16px 100px'}}>
      <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:1.2,
        textTransform:'uppercase',marginBottom:12}}>
        {inspections.length} Saved Inspection{inspections.length!==1?'s':''}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {inspections.map(insp => {
          const b=getBand(insp.overallScore);
          return (
            <div key={insp.id||insp.spItemId} style={{background:C.card,borderRadius:16,
              border:`2px solid ${b?b.color:C.lgrey}`,boxShadow:'0 2px 8px rgba(0,0,0,0.05)',overflow:'hidden'}}>
              <button onClick={()=>onView(insp)} style={{width:'100%',background:'none',border:'none',
                padding:'14px 16px',display:'flex',alignItems:'center',gap:12,cursor:'pointer',textAlign:'left'}}>
                <div style={{width:52,height:52,borderRadius:12,background:b?b.bg:C.lgrey,
                  display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <span style={{fontSize:17,fontWeight:900,color:b?b.color:C.muted}}>{insp.overallScore!=null?`${insp.overallScore}%`:'—'}</span>
                  <span style={{fontSize:9,fontWeight:700,color:b?b.color:C.muted}}>{b?b.short:'N/A'}</span>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:800,color:C.text}}>{insp.siteDetails?.siteName||'Unnamed site'}</div>
                  <div style={{fontSize:12,color:C.muted,marginTop:2}}>
                    {insp.siteDetails?.inspectionDate ? fmtDate(insp.siteDetails.inspectionDate) : 'No date'} · {insp.siteDetails?.inspectionType||'Inspection'}
                  </div>
                  <div style={{fontSize:11,color:C.muted,marginTop:1}}>Saved {fmtDate(insp.savedAt)}</div>
                </div>
                <span style={{color:C.muted,fontSize:18}}>›</span>
              </button>
              <div style={{borderTop:`1px solid ${C.lgrey}`,padding:'8px 16px',display:'flex',
                justifyContent:'flex-end',background:`${C.lgrey}50`}}>
                <button onClick={()=>{ if(window.confirm('Delete this inspection record?')) onDelete(insp); }}
                  style={{background:'none',border:'none',color:C.red,fontSize:12,fontWeight:700,
                    cursor:'pointer',padding:'4px 8px'}}>Delete</button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── INSPECTION DETAIL (read-only) ─────────────────────────────────────────
function InspectionDetail({inspection, onBack}) {
  const [expanded, setExpanded] = useState({});
  const overall=inspection.overallScore, band=getBand(overall);
  const toggle = id => setExpanded(p=>({...p,[id]:!p[id]}));

  return (
    <div style={{paddingBottom:100}}>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg, ${C.teal}, ${C.blue})`,
        padding:'14px 16px 20px',position:'sticky',top:0,zIndex:10}}>
        <button onClick={onBack} style={{background:'rgba(255,255,255,0.22)',border:'none',
          borderRadius:10,color:'#fff',padding:'6px 14px',fontSize:13,fontWeight:700,
          cursor:'pointer',marginBottom:10}}>← Back</button>
        <div style={{display:'flex',alignItems:'center',gap:14,color:'#fff'}}>
          <div style={{flex:1}}>
            <div style={{fontSize:18,fontWeight:900}}>{inspection.siteDetails?.siteName||'Inspection'}</div>
            <div style={{fontSize:12,opacity:0.8,marginTop:2}}>
              {inspection.siteDetails?.inspectionDate ? fmtDate(inspection.siteDetails.inspectionDate) : ''} · Saved {fmtDate(inspection.savedAt)}
            </div>
          </div>
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:30,fontWeight:900}}>{overall!=null?`${overall}%`:'—'}</div>
            <div style={{fontSize:11,opacity:0.85}}>{band?band.label:'Not scored'}</div>
          </div>
        </div>
      </div>

      <div style={{padding:'16px 16px 20px'}}>
        {/* Site details summary */}
        {inspection.siteDetails && (
          <div style={{background:C.card,borderRadius:16,padding:'14px',marginBottom:14,
            border:`1.5px solid ${C.lgrey}`}}>
            <div style={{fontSize:11,fontWeight:800,color:C.muted,letterSpacing:1,
              textTransform:'uppercase',marginBottom:10}}>Site Details</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              {[
                ['Site',inspection.siteDetails.siteName],
                ['Type',inspection.siteDetails.inspectionType],
                ['Date',inspection.siteDetails.inspectionDate?fmtDate(inspection.siteDetails.inspectionDate):'—'],
                ['Manager',inspection.siteDetails.registeredManager],
                ['CQC ID',inspection.siteDetails.cqcLocationId],
                ['Inspector',inspection.siteDetails.inspector],
                ['Provider',inspection.siteDetails.registeredProvider],
              ].filter(([,v])=>v).map(([k,v])=>(
                <div key={k}>
                  <div style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:'uppercase'}}>{k}</div>
                  <div style={{fontSize:13,color:C.text,fontWeight:600}}>{v}</div>
                </div>
              ))}
            </div>
            {inspection.siteDetails.contextNotes && (
              <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.lgrey}`}}>
                <div style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:'uppercase',marginBottom:4}}>Context Notes</div>
                <p style={{fontSize:13,color:C.text,lineHeight:1.6,margin:0}}>{inspection.siteDetails.contextNotes}</p>
              </div>
            )}
          </div>
        )}

        {/* Sections */}
        {SECTIONS.map(sec => {
          const pct=calcSection(sec.id, inspection.scores||{}), b=getBand(pct);
          const isOpen = expanded[sec.id];
          const secNote = (inspection.sectionNotes||{})[sec.id];
          return (
            <div key={sec.id} style={{background:C.card,borderRadius:16,marginBottom:10,
              border:`2px solid ${b?b.color:C.lgrey}`,overflow:'hidden',
              boxShadow:'0 2px 6px rgba(0,0,0,0.05)'}}>
              <button onClick={()=>toggle(sec.id)}
                style={{width:'100%',background:'none',border:'none',padding:'14px 16px',
                  display:'flex',alignItems:'center',gap:12,cursor:'pointer',textAlign:'left'}}>
                <span style={{fontSize:22}}>{sec.icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:800,color:C.text}}>{sec.title}</div>
                  <span style={{fontSize:9,fontWeight:700,color:'#fff',background:cqcCol(sec.cqcKey),
                    borderRadius:5,padding:'1px 7px',display:'inline-block',marginTop:2}}>{sec.cqcKey}</span>
                </div>
                <div style={{textAlign:'right',marginRight:8}}>
                  {pct!==null?(
                    <span style={{background:b.bg,color:b.color,border:`1.5px solid ${b.color}`,
                      borderRadius:12,padding:'3px 10px',fontSize:11,fontWeight:700}}>
                      {pct}% — {b.label}
                    </span>
                  ):<span style={{fontSize:11,color:C.muted}}>Not scored</span>}
                </div>
                <span style={{color:C.muted,transition:'transform 0.2s',
                  transform:isOpen?'rotate(90deg)':'rotate(0deg)'}}>›</span>
              </button>
              {isOpen && (
                <div style={{borderTop:`1px solid ${C.lgrey}`,padding:'12px 16px'}}>
                  {sec.criteria.map((c,i) => {
                    const score=(inspection.scores||{})[c.id], st=sStyle(score);
                    const cNote=(inspection.criterionNotes||{})[c.id];
                    return (
                      <div key={c.id} style={{marginBottom:10,paddingBottom:10,
                        borderBottom:i<sec.criteria.length-1?`1px solid ${C.lgrey}`:'none'}}>
                        <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                          <div style={{width:24,height:24,borderRadius:'50%',background:sec.color,color:'#fff',
                            display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,
                            fontWeight:800,flexShrink:0,marginTop:1}}>{i+1}</div>
                          <div style={{flex:1}}>
                            <p style={{fontSize:12.5,color:C.text,margin:'0 0 6px',lineHeight:1.5,fontWeight:500}}>{c.text}</p>
                            {score ? (
                              <span style={{background:st.bg,color:st.fg,borderRadius:8,
                                padding:'3px 10px',fontSize:11,fontWeight:700}}>
                                Score {score} — {sLabel[score]}
                              </span>
                            ):(
                              <span style={{fontSize:11,color:C.muted}}>Not scored</span>
                            )}
                            {cNote && (
                              <div style={{marginTop:8,background:`${C.blue}0D`,borderRadius:8,
                                padding:'8px 10px',border:`1px solid ${C.blue}30`}}>
                                <div style={{fontSize:10,color:C.blue,fontWeight:700,textTransform:'uppercase',marginBottom:3}}>Observation</div>
                                <p style={{fontSize:12,color:C.text,margin:0,lineHeight:1.5}}>{cNote}</p>
                              </div>
                            )}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                  {secNote && (
                    <div style={{background:`${sec.color}10`,borderRadius:10,padding:'10px 12px',
                      border:`1.5px solid ${sec.color}30`,marginTop:6}}>
                      <div style={{fontSize:10,color:sec.color,fontWeight:800,textTransform:'uppercase',marginBottom:4}}>Section Observations</div>
                      <p style={{fontSize:12.5,color:C.text,margin:0,lineHeight:1.6}}>{secNote}</p>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

          ].map(([n,t])=>(
            <div key={n} style={{display:'flex',gap:10,marginBottom:8}}>
              <div style={{minWidth:24,height:24,borderRadius:'50%',background:C.amber,color:'#fff',
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800,flexShrink:0}}>{n}</div>
              <p style={{fontSize:12,color:C.text,margin:0,lineHeight:1.6}}>{t}</p>
            </div>
          ))}
        </div>
      )}

      <div style={{marginTop:14,background:C.lgrey,borderRadius:14,padding:'12px 14px'}}>
        <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:4}}>
          Excellence in Care Accreditation Programme v2.0
        </div>
        <p style={{fontSize:11,color:C.muted,margin:0,lineHeight:1.6}}>
          Nimbuscare · 12 sections · 62 criteria<br/>
          Outstanding ≥90% · Good ≥75% · RI ≥50% · Inadequate &lt;50%
        </p>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────
export default function App() {
  // Navigation
  const [view,         setView]         = useState('dashboard');
  const [activeSection,setActiveSection]= useState(null);
  const [viewingInsp,  setViewingInsp]  = useState(null);

  // Inspection state
  const [scores,        setScores]       = useState({});
  const [sectionNotes,  setSectionNotes] = useState({});
  const [criterionNotes,setCriterionNotes]=useState({});
  const [siteDetails,   setSiteDetails]  = useState({});

  // Auth & storage
  const [msalInstance, setMsalInstance] = useState(null);
  const [account,      setAccount]      = useState(null);
  const [spSiteId,     setSpSiteId]     = useState(null);
  const [spListId,     setSpListId]     = useState(null);
  const [spStatus,     setSpStatus]     = useState('');
  const [savedInspections, setSavedInspections] = useState([]);
  const [isLoadingInspections, setIsLoadingInspections] = useState(false);
  const [isSaving,     setIsSaving]     = useState(false);

  // UI
  const [toast, setToast] = useState(null);
  const showToast = (message, type='success') => setToast({message,type});

  const isConfigured = !!(CFG.clientId && CFG.tenantId);
  const isAuthenticated = !!(account);

  // ── MSAL init ────────────────────────────────────────────────────────
  useEffect(() => {
    if(!isConfigured) return;
    try {
      const instance = new msal.PublicClientApplication({
        auth: {
          clientId:    CFG.clientId,
          authority:   `https://login.microsoftonline.com/${CFG.tenantId}`,
          redirectUri: window.location.href.split('?')[0].split('#')[0],
        },
        cache: { cacheLocation:'sessionStorage', storeAuthStateInCookie:true }
      });
      setMsalInstance(instance);
      // Handle redirect
      instance.handleRedirectPromise().then(response => {
        if(response?.account) {
          setAccount(response.account);
        } else {
          const accounts = instance.getAllAccounts();
          if(accounts.length > 0) setAccount(accounts[0]);
        }
      }).catch(e => console.error('MSAL redirect error:', e));
    } catch(e) { console.error('MSAL init error:', e); }
  }, []);

  // ── Initialise SharePoint when account is set ────────────────────────
  useEffect(() => {
    if(!account || !msalInstance) return;
    (async () => {
      try {
        const token = await getToken();
        const siteId = await getSiteId(token, CFG.spHost, CFG.spSitePath);
        setSpSiteId(siteId);
        const listId = await ensureList(token, siteId, CFG.listName);
        setSpListId(listId);
        setSpStatus(`Connected · ${CFG.listName}`);
        await loadInspections(token, siteId, listId);
      } catch(e) {
        console.error('SP init error:', e);
        showToast('SharePoint connection failed. Check your configuration.', 'error');
      }
    })();
  }, [account]);

  const getToken = async () => {
    if(!msalInstance || !account) throw new Error('Not authenticated');
    try {
      const res = await msalInstance.acquireTokenSilent({ scopes:SCOPES, account });
      return res.accessToken;
    } catch {
      const res = await msalInstance.acquireTokenRedirect({ scopes:SCOPES });
      return res?.accessToken;
    }
  };

  const loadInspections = async (token, siteId, listId) => {
    setIsLoadingInspections(true);
    try {
      const items = await spLoad(token, siteId, listId);
      setSavedInspections(items);
    } catch(e) {
      console.error('Load error:', e);
      showToast('Could not load inspections', 'error');
    } finally { setIsLoadingInspections(false); }
  };

  const handleSignIn = async () => {
    if(!msalInstance) return;
    try {
      await msalInstance.loginRedirect({ scopes: SCOPES });
    } catch(e) { console.error('Sign in error:', e); }
  };

  const handleSignOut = () => {
    if(!msalInstance) return;
    msalInstance.logoutRedirect();
    setAccount(null); setSpSiteId(null); setSpListId(null); setSavedInspections([]);
  };

  const handleSave = async () => {
    if(!spSiteId || !spListId) { showToast('Not connected to SharePoint', 'warn'); return; }
    setIsSaving(true);
    try {
      const token = await getToken();
      const overall = calcOverall(scores);
      const record = {
        id: uid(),
        savedAt: new Date().toISOString(),
        title: `${siteDetails.siteName||'Unnamed'} — ${siteDetails.inspectionDate ? fmtDate(siteDetails.inspectionDate) : new Date().toLocaleDateString('en-GB')}`,
        siteDetails,
        scores,
        sectionNotes,
        criterionNotes,
        overallScore: overall,
        sectionSummary: SECTIONS.map(s=>({id:s.id,title:s.title,score:calcSection(s.id,scores)})),
      };
      await spSave(token, spSiteId, spListId, record);
      await loadInspections(token, spSiteId, spListId);
      showToast('✅ Inspection saved to SharePoint!');
    } catch(e) {
      console.error('Save error:', e);
      showToast('Save failed. Please try again.', 'error');
    } finally { setIsSaving(false); }
  };

  const handleDelete = async (inspection) => {
    if(!inspection.spItemId) return;
    try {
      const token = await getToken();
      await spDelete(token, spSiteId, spListId, inspection.spItemId);
      setSavedInspections(p=>p.filter(i=>i.spItemId!==inspection.spItemId));
      showToast('Inspection deleted');
    } catch(e) {
      showToast('Delete failed', 'error');
    }
  };

  const onSelectSection = id => {
    setActiveSection(SECTIONS.find(s=>s.id===id));
    setView('sectionDetail');
  };

  const onScore = (id, score) => setScores(p => {
    const n={...p}; if(score===null) delete n[id]; else n[id]=score; return n;
  });

  const overall = calcOverall(scores);
  const band = getBand(overall);

  // ── NAV ──────────────────────────────────────────────────────────────
  const tabs = [
    {id:'dashboard', label:'Dashboard', icon:'📊'},
    {id:'sections',  label:'Sections',  icon:'📋'},
    {id:'history',   label:'History',   icon:'📁'},
    {id:'site',      label:'Site',      icon:'🏥'},
  ];
  const activeTab = view==='sectionDetail'?'sections': view==='inspectionDetail'?'history': view==='settings'?'':view;

  return (
    <div style={{fontFamily:"'Lato',system-ui,-apple-system,sans-serif",
      background:C.bg,minHeight:'100vh',maxWidth:768,margin:'0 auto',position:'relative'}}>

      {/* ── HEADER — white, teal underline accent, faithful to nimbuscare.co.uk ── */}
      <div className="no-print" style={{
        background:C.card,
        borderBottom:`3px solid ${C.teal}`,
        padding:'0 16px',
        display:'flex',alignItems:'center',justifyContent:'space-between',
        position:'sticky',top:0,zIndex:20,
        boxShadow:'0 2px 8px rgba(0,0,0,0.08)',
        height:56,
        paddingTop:'env(safe-area-inset-top,0px)',
      }}>
        <NimbuscareLogo height={30} light={false}/>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          {overall!==null && (
            <div style={{background:band.bg,border:`1px solid ${band.color}40`,borderRadius:6,
              padding:'4px 10px',textAlign:'center'}}>
              <div style={{fontSize:16,fontWeight:900,color:band.color,lineHeight:1,
                fontFamily:"'Montserrat',sans-serif"}}>{overall}%</div>
              <div style={{fontSize:8,fontWeight:700,color:band.color,letterSpacing:0.4,
                textTransform:'uppercase'}}>{band.label}</div>
            </div>
          )}
          <button onClick={()=>setView('settings')}
            style={{background:'none',border:`1px solid ${C.lgrey}`,borderRadius:6,
              color:C.muted,width:34,height:34,fontSize:16,cursor:'pointer',
              display:'flex',alignItems:'center',justifyContent:'center'}}>⚙</button>
        </div>
      </div>

      {/* ── Sub-header: app name strip — teal bar matching site's colour usage ── */}
      {(view==='dashboard'||view==='sections'||view==='history'||view==='site') && (
        <div className="no-print" style={{
          background:C.teal,padding:'6px 16px',
          display:'flex',alignItems:'center',justifyContent:'space-between',
        }}>
          <span style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,0.9)',
            letterSpacing:1.2,textTransform:'uppercase',fontFamily:"'Lato',sans-serif"}}>
            Excellence in Care Accreditation Programme
          </span>
          {siteDetails?.inspectionDate && (
            <span style={{fontSize:10,color:'rgba(255,255,255,0.7)',fontFamily:"'Lato',sans-serif"}}>
              {fmtDate(siteDetails.inspectionDate)}
            </span>
          )}
        </div>
      )}

      {/* Toast */}
      {toast && <Toast {...toast} onDone={()=>setToast(null)}/>}

      {/* Content */}
      <div>
        {view==='dashboard' && (
          <Dashboard scores={scores} siteDetails={siteDetails}
            onSelectSection={onSelectSection}
            isAuthenticated={isAuthenticated} onSignIn={handleSignIn}
            onSave={handleSave} isSaving={isSaving}/>
        )}
        {view==='sections' && (
          <SectionList scores={scores} sectionNotes={sectionNotes}
            criterionNotes={criterionNotes} onSelectSection={onSelectSection}/>
        )}
        {view==='sectionDetail' && activeSection && (
          <SectionView section={activeSection} scores={scores} onScore={onScore}
            sectionNotes={sectionNotes} onSectionNote={(id,v)=>setSectionNotes(p=>({...p,[id]:v}))}
            criterionNotes={criterionNotes} onCriterionNote={(id,v)=>setCriterionNotes(p=>({...p,[id]:v}))}
            onBack={()=>setView('sections')}/>
        )}
        {view==='history' && (
          <PastInspections inspections={savedInspections}
            isAuthenticated={isAuthenticated} onSignIn={handleSignIn}
            onView={insp=>{ setViewingInsp(insp); setView('inspectionDetail'); }}
            onDelete={handleDelete} isLoading={isLoadingInspections}/>
        )}
        {view==='inspectionDetail' && viewingInsp && (
          <InspectionDetail inspection={viewingInsp} onBack={()=>setView('history')}/>
        )}
        {view==='site' && (
          <SiteDetails siteDetails={siteDetails} setSiteDetails={setSiteDetails}/>
        )}
        {view==='settings' && (
          <SettingsView isAuthenticated={isAuthenticated} account={account}
            onSignIn={handleSignIn} onSignOut={handleSignOut} spStatus={spStatus}/>
        )}
      </div>

      {/* ── BOTTOM NAV — white, clean, teal active state ── */}
      <div className="no-print" style={{
        position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',
        width:'100%',maxWidth:768,background:C.card,
        borderTop:`2px solid ${C.teal}`,
        display:'grid',gridTemplateColumns:`repeat(${tabs.length},1fr)`,
        paddingBottom:'env(safe-area-inset-bottom,6px)',
        boxShadow:'0 -2px 16px rgba(0,0,0,0.08)',zIndex:30,
      }}>
        {tabs.map(t=>{
          const isActive=activeTab===t.id;
          return (
            <button key={t.id}
              onClick={()=>{ setView(t.id); if(t.id!=='sections') setActiveSection(null); if(t.id==='history'&&isAuthenticated&&spSiteId&&spListId){ getToken().then(tok=>loadInspections(tok,spSiteId,spListId)).catch(()=>{}); } }}
              style={{background:'none',border:'none',padding:'9px 0 7px',
                display:'flex',flexDirection:'column',alignItems:'center',gap:2,
                cursor:'pointer',WebkitAppearance:'none',position:'relative',
                borderTop:isActive?`3px solid ${C.teal}`:'3px solid transparent',
              }}>
              <span style={{fontSize:20,transition:'transform 0.15s',
                transform:isActive?'scale(1.1)':'scale(1)',
                filter:isActive?'none':'grayscale(0.3) opacity(0.7)'}}>{t.icon}</span>
              <span style={{fontSize:10,fontWeight:isActive?700:400,
                color:isActive?C.teal:C.muted,
                fontFamily:"'Lato',sans-serif",
                letterSpacing:0.2,
                transition:'color 0.15s'}}>{t.label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
